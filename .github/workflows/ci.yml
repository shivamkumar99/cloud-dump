name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test -v -race ./internal/...

  integration:
    name: Integration Tests (PG${{ matrix.pg-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pg-version: "17"
            pgurl: "postgres://repl_user:repl_password@localhost:5432/postgres?replication=yes"
            service: postgres17
          - pg-version: "18"
            pgurl: "postgres://repl_user:repl_password@localhost:5434/postgres?replication=yes"
            service: postgres18

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start PostgreSQL ${{ matrix.pg-version }}
        run: docker compose -f docker/docker-compose.yml up -d ${{ matrix.service }}

      - name: Wait for PostgreSQL ${{ matrix.pg-version }}
        run: |
          echo "Waiting for ${{ matrix.service }}..."
          for i in $(seq 1 30); do
            docker compose -f docker/docker-compose.yml exec -T ${{ matrix.service }} \
              pg_isready -U postgres -q && break
            echo "  attempt $i/30 — not ready"
            sleep 3
          done
          docker compose -f docker/docker-compose.yml exec -T ${{ matrix.service }} \
            pg_isready -U postgres -q || (echo "Timed out waiting for ${{ matrix.service }}"; exit 1)

      - name: Integration tests against PG${{ matrix.pg-version }}
        env:
          PGURL: ${{ matrix.pgurl }}
        run: go test -tags integration -v -race -timeout 10m ./tests/integration/...

      - name: Stop services
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
