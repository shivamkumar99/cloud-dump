name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test -v -race ./internal/...

  # Integration tests require a live PostgreSQL + Storj credentials.
  # Run locally with: make test-integration
  # To re-enable here, add STORJ_ACCESS / STORJ_BUCKET to GitHub Actions
  # secrets and uncomment this job.
  #
  # integration:
  #   name: Integration Tests (PG${{ matrix.pg-version }})
  #   ...
