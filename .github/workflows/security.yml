name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC to catch newly published CVEs
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write   # required for uploading SARIF results to GitHub

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. govulncheck — official Go vulnerability scanner
  #    Checks your exact dependency graph against the Go vulnerability database.
  #    Only reports vulnerabilities that are reachable from your code.
  # ─────────────────────────────────────────────────────────────────────────────
  govulncheck:
    name: govulncheck (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Always use the latest stable Go so stdlib CVEs fixed in newer
          # toolchains are resolved. The toolchain directive in go.mod pins
          # the minimum patched version (go1.25.8 fixes GO-2026-4601/4602).
          go-version: stable

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run govulncheck — text report
        run: govulncheck ./... 2>&1 | tee reports/govulncheck.txt
        continue-on-error: true

      - name: Run govulncheck — JSON report
        run: govulncheck -json ./... > reports/govulncheck.json 2>&1
        continue-on-error: true

      - name: Upload govulncheck reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: reports/govulncheck.*
          retention-days: 30

      - name: Fail if vulnerabilities found
        run: govulncheck ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. gosec — Go security static analyser
  #    Detects: hardcoded credentials, SQL injection, unsafe file permissions,
  #    weak crypto, unhandled errors in security-sensitive calls, etc.
  #    Outputs SARIF so findings appear in GitHub Security → Code scanning.
  # ─────────────────────────────────────────────────────────────────────────────
  gosec:
    name: gosec (static security analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run gosec — SARIF (for GitHub Security tab)
        run: gosec -no-fail -fmt sarif -out reports/gosec.sarif ./...

      - name: Run gosec — JSON report
        run: gosec -no-fail -fmt json -out reports/gosec.json ./...

      - name: Run gosec — human-readable text report
        run: gosec -no-fail -fmt text -out reports/gosec.txt ./...

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/gosec.sarif
          category: gosec

      - name: Upload gosec reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: reports/gosec.*
          retention-days: 30

      - name: Fail on high-severity findings
        # Exclude G104 (unhandled errors in non-critical paths) to reduce noise.
        run: gosec -severity high -confidence medium -exclude G104 ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Dependency review — PR-only
  #    Blocks merging PRs that add dependencies with known CVEs or use
  #    restrictive SPDX licenses.
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency review (PRs only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Allow OSI-approved permissive licenses; block copyleft and unknown.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Summary — bundles all reports into one downloadable zip
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Bundle all reports
    runs-on: ubuntu-latest
    needs: [govulncheck, gosec]
    if: always()
    steps:
      - name: Download govulncheck report
        uses: actions/download-artifact@v4
        with:
          name: govulncheck-report
          path: all-reports/govulncheck/
        continue-on-error: true

      - name: Download gosec report
        uses: actions/download-artifact@v4
        with:
          name: gosec-report
          path: all-reports/gosec/
        continue-on-error: true

      - name: Write summary index
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          cat > all-reports/README.txt <<EOF
          cloud-dump Security Scan Reports
          =================================
          Run   : $RUN_URL
          Ref   : ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Date  : $(date -u +"%Y-%m-%d %H:%M UTC")

          Files
          -----
          govulncheck/govulncheck.txt   — human-readable CVE report (official Go vuln DB)
          govulncheck/govulncheck.json  — machine-readable JSON
          gosec/gosec.txt               — human-readable static analysis findings
          gosec/gosec.json              — machine-readable JSON
          gosec/gosec.sarif             — SARIF (also uploaded to GitHub Security tab)
          EOF

      - name: Upload combined security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_number }}
          path: all-reports/
          retention-days: 90
